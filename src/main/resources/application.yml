server:
  port: 6666
  servlet:
    context-path: /api

spring:
  application:
    name: ai-creation
  
  profiles:
    active: dev
  
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://127.0.0.1:5432/ai_creation
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # 数据库初始化已通过 CommandLineRunner 处理，不再使用自动DDL执行
        
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  


mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.aicreation.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    cache-enabled: false

# 自定义配置
app:
  jwt:
    secret: ${JWT_SECRET:aiCreationSecretKey2024}
    expiration: 86400000  # 24小时
  volcengine:
    api-key: ${VOLCENGINE_API_KEY:644bad9b-cf07-49ac-bc57-7e0baac2e398}
  doubao:
    tts:
      app-id: ${DOUBAO_TTS_APP_ID:2119661233}
      access-token: ${DOUBAO_TTS_ACCESS_TOKEN:Yu7I8HtdJXvD9WgepagbXbPoYx1GqhTf}
      cluster: volcano_tts
      ws-url: wss://openspeech.bytedance.com/api/v3/tts/unidirectional/stream
      http-url: https://openspeech.bytedance.com/api/v1/tts
      default-voice-type: zh_female_cancan_mars_bigtts
      default-encoding: mp3
      default-speed-ratio: 1.0
      default-rate: 24000
      default-bitrate: 160
  audio:
    file-path: file
    file-prefix: audio

  # 支付宝（当面付）配置：上线前请改为生产值并使用环境变量注入
  alipay:
    app-id: ${ALIPAY_APP_ID:}
    private-key: ${ALIPAY_PRIVATE_KEY:}
    alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
    gateway: ${ALIPAY_GATEWAY:https://openapi.alipay.com/gateway.do}
    notify-url: ${ALIPAY_NOTIFY_URL:http://www.talex.top/api/wallet/recharge/callback/alipay}

  # 微信支付（Native 扫码：统一下单）
  wechat:
    app-id: ${WECHAT_APP_ID:}
    mch-id: ${WECHAT_MCH_ID:}
    api-key: ${WECHAT_API_KEY:}
    notify-url: ${WECHAT_NOTIFY_URL:http://www.talex.top/api/wallet/recharge/callback/wechat}
    spbill-create-ip: ${WECHAT_SPBILL_CREATE_IP:127.0.0.1}
    unified-order-url: ${WECHAT_UNIFIED_ORDER_URL:https://api.mch.weixin.qq.com/pay/unifiedorder}

# Swagger 配置
springdoc:
  swagger-ui:
    path: /swagger-ui
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs 